<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro Quiz Player</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;800&family=Sora:wght@600;700;800&display=swap" rel="stylesheet">
<style>
body {
    margin:0;
    font-family:'Inter', sans-serif;
    background: radial-gradient(circle at top left, #141e30, #243b55);
    color:white;
    text-align:center;
}
.container {
    max-width:700px;
    margin:auto;
    padding:60px 20px;
}

@media (max-width: 768px){
    .container{
        padding:30px 15px;
    }
}
.glass {
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(20px);
    padding:30px;
    border-radius:20px;
    box-shadow:0 15px 30px rgba(0,0,0,0.3);
}
input {
    padding:12px;
    border-radius:12px;
    border:none;
    margin:10px;
    font-size:16px;
}
button {
    width:260px;
    height:70px;
    margin:15px;
    border:none;
    border-radius:18px;
    font-size:20px;
    font-weight:700;
    cursor:pointer;
    transition:0.2s;
}

@media (max-width: 768px){
    button{
        width:100%;
        height:65px;
        margin:10px 0;
        font-size:18px;
    }
}
button:hover { transform:scale(1.05); }

.red { background:#ff4d4d; }
.blue { background:#4d79ff; }
.yellow { background:#ffd633; color:black; }
.green { background:#33cc99; }

.disabled {
    opacity:0.5;
    pointer-events:none;
}


/* === SVG Circular Timer === */
.timer-wrapper{
    display:flex;
    justify-content:center;
    align-items:center;
    margin:30px 0;
}

.timer-svg{
    transform:rotate(-90deg);
}

.timer-circle-bg{
    fill:none;
    stroke:rgba(255,255,255,0.15);
    stroke-width:10;
}

.timer-circle{
    fill:none;
    stroke:#00ffcc;
    stroke-width:10;
    stroke-linecap:round;
    transition:stroke-dashoffset 0.2s linear;
}

.timer-text{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%, -50%);
    font-size:32px;
    font-weight:900;
    pointer-events:none;
}

.waiting {
    font-size:24px;
    opacity:0.8;
    margin-top:30px;
}

.error {
    color:#ff7675;
    font-weight:600;
}

/* === Kahoot Style Enhancements === */

.question-title {
    font-size:28px;
    font-weight:800;
    margin-bottom:25px;
}

.answer-card {
    width:100%;
    padding:18px;
    margin:12px 0;
    border-radius:20px;
    font-size:18px;
    font-weight:700;
    border:none;
    cursor:pointer;
    transition:all 0.25s ease;
    box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

@media (max-width: 768px){
    .answer-card{
        font-size:16px;
        padding:16px;
        border-radius:16px;
    }
}

.answer-card:hover {
    transform:scale(1.03);
}

.selected {
    outline:4px solid white;
    transform:scale(1.05);
}

.correct {
    background:#00c853 !important;
    box-shadow:0 0 25px rgba(0,255,0,0.7);
}

.wrong {
    background:#d50000 !important;
}

.dimmed {
    filter:brightness(0.75);
}

.stats-container{
    margin-top:40px;
    padding:30px;
    border-radius:24px;
    background:rgba(255,255,255,0.06);
    backdrop-filter:blur(18px);
    box-shadow:0 25px 80px rgba(0,0,0,0.5);
}

.stats-item{
    margin:18px 0;
    font-weight:800;
    font-size:18px;
    letter-spacing:0.3px;
}

.stats-bar{
    height:14px;
    border-radius:14px;
    margin-top:8px;
    background:rgba(255,255,255,0.12);
    overflow:hidden;
}

.stats-fill{
    height:100%;
    border-radius:14px;
    background:linear-gradient(90deg,#8b5cf6,#00c6ff);
    width:0%;
    transition:width 0.9s cubic-bezier(.16,1,.3,1);
}

/* === Points Animation === */
.points-popup {
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    font-size:48px;
    font-weight:900;
    color:#00ffcc;
    text-shadow:0 0 20px rgba(0,255,200,0.8);
    animation:pointsFloat 1.5s ease-out forwards;
    pointer-events:none;
    z-index:9999;
}

@keyframes pointsFloat {
    0% { opacity:0; transform:translate(-50%,-40%) scale(0.6); }
    20% { opacity:1; transform:translate(-50%,-50%) scale(1.2); }
    80% { opacity:1; transform:translate(-50%,-70%) scale(1); }
    100% { opacity:0; transform:translate(-50%,-90%) scale(0.8); }
}

/* === Fast / Wrong Effects === */
.fast-glow {
    animation:fastGlow 0.6s ease;
}

@keyframes fastGlow {
    0% { background:#00ffcc; }
    100% { background:transparent; }
}

/* === Shake Effect === */
.shake {
    animation:shake 0.5s ease;
}

@keyframes shake {
    0% { transform:translateX(0); }
    20% { transform:translateX(-10px); }
    40% { transform:translateX(10px); }
    60% { transform:translateX(-6px); }
    80% { transform:translateX(6px); }
    100% { transform:translateX(0); }
}

/* === AGGRESSIVE CORRECT / WRONG FLASH (PLAYER) === */
body.correct-flash{
    animation:correctFlash 0.6s ease;
}

@keyframes correctFlash{
    0%{ background:#0f3d2e; }
    40%{ background:#00c853; }
    100%{ background: radial-gradient(circle at top left, #141e30, #243b55); }
}

body.wrong-flash{
    animation:wrongFlash 0.6s ease;
}

@keyframes wrongFlash{
    0%{ background:#3d0f0f; }
    40%{ background:#d50000; }
    100%{ background: radial-gradient(circle at top left, #141e30, #243b55); }
}

/* === Fastest Bonus Effect === */
.fastest-badge {
    position:fixed;
    top:20%;
    left:50%;
    transform:translateX(-50%);
    font-size:26px;
    font-weight:900;
    color:#ffd700;
    animation:fadeFastest 1.5s ease-out forwards;
    z-index:9999;
}

@keyframes fadeFastest {
    0% { opacity:0; transform:translateX(-50%) translateY(-20px); }
    20% { opacity:1; transform:translateX(-50%) translateY(0); }
    80% { opacity:1; }
    100% { opacity:0; transform:translateX(-50%) translateY(-30px); }
}

/* === Confetti Effect === */
.confetti-piece {
    position:fixed;
    width:8px;
    height:14px;
    background:yellow;
    top:-20px;
    animation:confettiFall 2s linear forwards;
}

@keyframes confettiFall {
    to { transform:translateY(100vh) rotate(720deg); opacity:0; }
}

/* ===== BOMB PODIUM ANIMATION (PLAYER) ===== */
.podium-wrapper {
    display:flex;
    align-items:flex-end;
    justify-content:center;
    gap:30px;
    margin-top:60px;
}

@media (max-width: 768px){
    .podium-wrapper{
        flex-direction:column;
        align-items:center;
        gap:20px;
    }

    .podium-card{
        width:90%;
        transform:none;
    }
}

.podium-card {
    width:160px;
    border-radius:24px;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    font-size:20px;
    font-weight:900;
    background:linear-gradient(145deg,#ffffff22,#ffffff08);
    box-shadow:0 25px 60px rgba(0,0,0,0.6);
    transform:translateY(400px) scale(0.6);
    opacity:0;
}

.podium-first { height:240px; background:linear-gradient(145deg,#ffd700,#ffb300); }
.podium-second { height:200px; background:linear-gradient(145deg,#cfd8dc,#90a4ae); }
.podium-third { height:170px; background:linear-gradient(145deg,#ff7043,#bf360c); }

@keyframes podiumRise {
    0% { transform:translateY(400px) scale(0.5); opacity:0; }
    60% { transform:translateY(-30px) scale(1.1); opacity:1; }
    80% { transform:translateY(10px) scale(0.95); }
    100% { transform:translateY(0) scale(1); opacity:1; }
}

.podium-show-1 { animation:podiumRise 0.8s cubic-bezier(.17,.67,.83,.67) forwards; animation-delay:0.2s; }
.podium-show-2 { animation:podiumRise 0.8s cubic-bezier(.17,.67,.83,.67) forwards; animation-delay:0.4s; }
.podium-show-3 { animation:podiumRise 0.8s cubic-bezier(.17,.67,.83,.67) forwards; animation-delay:0.6s; }

@keyframes glowPulse {
    0% { box-shadow:0 0 10px rgba(255,255,255,0.2); }
    50% { box-shadow:0 0 40px rgba(255,255,255,0.9); }
    100% { box-shadow:0 0 10px rgba(255,255,255,0.2); }
}
.podium-first.glow {
    animation:
        podiumRise 0.8s cubic-bezier(.17,.67,.83,.67) forwards,
        glowPulse 2s infinite alternate 0.8s;
}
/* === Pause Overlay === */
.pause-overlay{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.85);
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:9999;
    font-size:32px;
    font-weight:900;
    letter-spacing:1px;
    backdrop-filter:blur(8px);
    text-align:center;
}

.pause-overlay.hidden{
    display:none;
}
/* === IMAGE GUESS MODE (EXACT HOST COPY) === */
.image-mask{
    width:600px;
    height:600px;
    margin:40px auto;
    overflow:hidden;
    border-radius:26px;
    box-shadow:0 35px 100px rgba(0,0,0,0.85);
    background-repeat:no-repeat;
    background-clip:padding-box;
    transition:background-size 1.4s cubic-bezier(.16,1,.3,1);
    will-change:background-size, background-position;
}

.image-mask.full-view{
    background-size:cover !important;
    background-position:center center !important;
}

/* ===== Professional UI Override Layer ===== */
:root{
    --bg1:#061a27;
    --bg2:#0b2438;
    --surface:rgba(6, 25, 39, 0.78);
    --surface-strong:rgba(6, 25, 39, 0.92);
    --line:rgba(150, 197, 230, 0.22);
    --text:#eaf4fb;
    --muted:#9ec4dc;
    --accent:#0ea5a4;
    --accent2:#22c55e;
    --danger:#ef4444;
}

*{
    box-sizing:border-box;
}

body{
    min-height:100vh;
    font-family:"DM Sans",sans-serif;
    color:var(--text);
    background:radial-gradient(1200px 900px at 0% 0%, #10415d 0%, transparent 45%),
               radial-gradient(1000px 700px at 100% 100%, #10324a 0%, transparent 45%),
               linear-gradient(145deg,var(--bg1),var(--bg2));
    overflow-x:hidden;
}

body::before,
body::after{
    content:"";
    position:fixed;
    border-radius:999px;
    filter:blur(80px);
    pointer-events:none;
    z-index:-1;
}

body::before{
    width:320px;
    height:320px;
    top:-70px;
    left:-55px;
    background:rgba(14,165,164,0.24);
    animation:playerOrbOne 13s ease-in-out infinite alternate;
}

body::after{
    width:360px;
    height:360px;
    right:-80px;
    bottom:-100px;
    background:rgba(249,115,22,0.16);
    animation:playerOrbTwo 15s ease-in-out infinite alternate;
}

@keyframes playerOrbOne{
    from{transform:translate(0,0) scale(1);}
    to{transform:translate(28px,24px) scale(1.09);}
}

@keyframes playerOrbTwo{
    from{transform:translate(0,0) scale(1);}
    to{transform:translate(-30px,-22px) scale(1.08);}
}

.container{
    max-width:760px;
    padding:50px 18px;
}

.glass{
    background:linear-gradient(170deg, rgba(11,39,58,.8), rgba(6,25,39,.74));
    border:1px solid var(--line);
    border-radius:24px;
    box-shadow:0 20px 50px rgba(3,14,24,.52), inset 0 1px 0 rgba(255,255,255,.06);
    animation:panelFloatIn .45s ease;
}

@keyframes panelFloatIn{
    from{opacity:0;transform:translateY(10px);}
    to{opacity:1;transform:translateY(0);}
}

h1,h2,.question-title{
    font-family:"Sora",sans-serif;
    letter-spacing:.02em;
}

input{
    width:min(100%, 290px);
    background:rgba(4,18,30,.78);
    color:var(--text);
    border:1px solid var(--line);
    border-radius:12px;
    outline:none;
    transition:border-color .25s ease, box-shadow .25s ease, transform .25s ease;
}

input:focus{
    border-color:rgba(14,165,164,.72);
    box-shadow:0 0 0 4px rgba(14,165,164,.18);
    transform:translateY(-1px);
}

button{
    border:1px solid rgba(255,255,255,.14);
    font-family:"Sora",sans-serif;
    letter-spacing:.01em;
    border-radius:14px;
    background:linear-gradient(130deg,#0ea5a4,#0891b2);
}

button:hover{
    transform:translateY(-2px) scale(1.01);
    box-shadow:0 14px 34px rgba(0,0,0,.34);
}

.answer-card{
    border:1px solid rgba(255,255,255,.14);
    border-radius:16px;
    transform:translateY(12px);
    opacity:0;
    animation:answerEntry .4s ease forwards;
}

.answer-card:nth-of-type(2){animation-delay:.05s;}
.answer-card:nth-of-type(3){animation-delay:.1s;}
.answer-card:nth-of-type(4){animation-delay:.15s;}

@keyframes answerEntry{
    from{transform:translateY(12px);opacity:0;}
    to{transform:translateY(0);opacity:1;}
}

.selected{
    outline:3px solid rgba(236,253,245,.98);
}

.correct{
    box-shadow:0 0 0 2px rgba(16,185,129,.9), 0 0 28px rgba(16,185,129,.55);
}

.wrong{
    box-shadow:0 0 0 2px rgba(239,68,68,.8), 0 0 24px rgba(239,68,68,.42);
}

.timer-svg{
    filter:drop-shadow(0 0 14px rgba(14,165,164,.34));
}

.timer-text{
    font-family:"Sora",sans-serif;
}

.waiting{
    color:var(--muted);
}

.error{
    color:#fecaca;
    background:rgba(127,29,29,.35);
    border:1px solid rgba(252,165,165,.4);
    border-radius:12px;
    margin-top:12px;
    padding:10px 12px;
}

.pause-overlay{
    background:rgba(2,14,24,0.86);
    border-top:1px solid rgba(150,197,230,.28);
}

body.correct-flash{
    animation:correctFlash 0.6s ease;
}

@keyframes correctFlash{
    0%{ background:#08382a; }
    40%{ background:#059669; }
    100%{
        background:radial-gradient(1200px 900px at 0% 0%, #10415d 0%, transparent 45%),
                   radial-gradient(1000px 700px at 100% 100%, #10324a 0%, transparent 45%),
                   linear-gradient(145deg,var(--bg1),var(--bg2));
    }
}

body.wrong-flash{
    animation:wrongFlash 0.6s ease;
}

@keyframes wrongFlash{
    0%{ background:#3f1615; }
    40%{ background:#b91c1c; }
    100%{
        background:radial-gradient(1200px 900px at 0% 0%, #10415d 0%, transparent 45%),
                   radial-gradient(1000px 700px at 100% 100%, #10324a 0%, transparent 45%),
                   linear-gradient(145deg,var(--bg1),var(--bg2));
    }
}

@media (max-width: 768px){
    .container{
        padding:26px 12px 38px;
    }

    .glass{
        border-radius:18px;
        padding:18px;
    }

    .question-title{
        font-size:24px;
    }

    .image-mask{
        width:100%;
        height:360px;
        max-width:100%;
    }
}

@media (prefers-reduced-motion:reduce){
    *{
        animation:none !important;
        transition:none !important;
    }
}

/* === AUDIO QUESTION UI (PLAYER) === */
.audio-panel{
    margin:18px auto 26px;
    max-width:760px;
    padding:16px 18px;
    border-radius:22px;
    border:1px solid rgba(150,197,230,.22);
    background:linear-gradient(180deg, rgba(9,42,62,.55), rgba(6,25,39,.55));
    box-shadow:0 18px 45px rgba(0,0,0,.35), inset 0 1px 0 rgba(255,255,255,.06);
    backdrop-filter:blur(14px);
}

.audio-panel-header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
    margin-bottom:10px;
}

.audio-panel-title{
    display:flex;
    align-items:center;
    gap:10px;
    font-family:"Sora",sans-serif;
    font-weight:900;
    letter-spacing:.01em;
    font-size:16px;
    color:var(--text);
}

.audio-badge{
    font-size:12px;
    font-weight:900;
    padding:7px 12px;
    border-radius:999px;
    border:1px solid rgba(14,165,164,.35);
    background:rgba(14,165,164,.14);
    color:#bff7f6;
}

.audio-panel-hint{
    font-size:13px;
    font-weight:800;
    color:var(--muted);
    text-align:right;
}

/* === AUDIO PLAYER WHITE PILL SHELL + LIGHT CONTROLS === */
.audio-player-shell{
    background:rgba(255,255,255,0.95);
    border-radius:999px;
    padding:12px 14px;
    box-shadow:0 10px 28px rgba(0,0,0,0.22);
}

#questionAudio{
    display:block;
    width:100%;
    height:42px;
    border-radius:999px;
    color-scheme: light; /* forces a light (white) native control bar in Chromium */
    background:transparent;
}

/* Make native controls panel transparent so the white shell shows through (Chrome/Safari) */
#questionAudio::-webkit-media-controls-panel{
    background-color:transparent;
}
#questionAudio::-webkit-media-controls-enclosure{
    background-color:transparent;
}

.audio-divider{
    height:1px;
    background:rgba(150,197,230,.18);
    margin:12px 0 14px;
}

.audio-mini-actions{
    display:flex;
    flex-wrap:wrap;
    gap:12px;
    align-items:center;
    justify-content:flex-end;
}

.audio-btn{
    width:auto;
    height:52px;
    padding:0 18px;
    margin:0;
    border-radius:16px;
    font-size:16px;
    font-weight:900;
    letter-spacing:0.01em;
    border:1px solid rgba(255,255,255,0.14);
    background:linear-gradient(130deg,#0ea5a4,#0891b2);
}

.audio-btn.secondary{
    background:linear-gradient(130deg,#ea580c,#ef4444);
}


/* optional external progress line (kept hidden because native controls show it) */
.audio-progress{display:none;}

/* === AUDIO QUESTION NOTE (PLAYER) === */
.audio-note{
    margin:12px auto 10px;
    max-width:760px;
    padding:12px 14px;
    border-radius:16px;
    border:1px solid rgba(150,197,230,.22);
    background:rgba(9,42,62,.40);
    color:var(--muted);
    font-weight:800;
    font-size:13px;
    line-height:1.35;
    text-align:center;
}

.audio-note b{color:var(--text);}

/* === LIVE UPDATE TOAST (PLAYER) === */
.player-toast{
    position:fixed;
    left:50%;
    bottom:26px;
    transform:translateX(-50%);
    z-index:9999;
    padding:12px 14px;
    border-radius:14px;
    border:1px solid rgba(150,197,230,.22);
    background:rgba(9,42,62,.65);
    color:var(--text);
    font-weight:900;
    box-shadow:0 18px 55px rgba(0,0,0,.45);
    opacity:0;
    pointer-events:none;
    transition:opacity .25s ease, transform .25s ease;
}
.player-toast.show{
    opacity:1;
    transform:translateX(-50%) translateY(-6px);
}
/* === APPEAL (PLAYER) === */
.appeal-box{
    margin:16px auto 0;
    max-width:760px;
    padding:14px 14px;
    border-radius:18px;
    border:1px solid rgba(150,197,230,.24);
    background:rgba(9,42,62,.45);
    box-shadow:0 16px 40px rgba(0,0,0,.35);
    text-align:left;
}
.appeal-box-title{
    font-family:"Sora",sans-serif;
    font-weight:900;
    font-size:16px;
    letter-spacing:.01em;
    margin-bottom:10px;
}
.appeal-hint{
    font-weight:800;
    color:var(--muted);
    font-size:13px;
    line-height:1.35;
}
.appeal-reason{
    width:100%;
    margin-top:10px;
    padding:12px 12px;
    border-radius:14px;
    border:1px solid rgba(150,197,230,.22);
    background:rgba(4,18,30,.62);
    color:var(--text);
    outline:none;
    font-weight:700;
    resize:vertical;
}
.appeal-actions{
    margin-top:10px;
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    justify-content:flex-end;
}
.appeal-btn{
    height:52px;
    padding:0 18px;
    border-radius:16px;
    font-weight:900;
    cursor:pointer;
    border:1px solid rgba(255,255,255,.14);
}
.appeal-btn.primary{
    background:linear-gradient(130deg,#0ea5a4,#0891b2);
}
.appeal-btn.secondary{
    background:rgba(255,255,255,0.08);
}
.appeal-status{
    margin-top:10px;
    font-weight:900;
    color:var(--muted);
}

/* === Professional UI Refinement Layer === */
:root{
    --ui-bg-top:#081924;
    --ui-bg-bottom:#0e2537;
    --ui-surface:rgba(6, 19, 31, 0.84);
    --ui-line:rgba(173,216,255,0.12);
    --ui-text:#eef6fb;
    --ui-muted:#a8c3d8;
    --ui-shadow:0 24px 70px rgba(0,0,0,.32);
}

body{
    font-family:"DM Sans", sans-serif;
    color:var(--ui-text);
    background:
        radial-gradient(900px 620px at 0% 0%, rgba(15,118,110,.10), transparent 48%),
        radial-gradient(900px 620px at 100% 100%, rgba(59,130,246,.08), transparent 44%),
        linear-gradient(160deg, var(--ui-bg-top), var(--ui-bg-bottom));
}

.container{
    max-width:760px;
}

.glass,
.stats-container,
.appeal-box{
    background:linear-gradient(180deg, rgba(255,255,255,.045), rgba(255,255,255,.02));
    border:1px solid var(--ui-line);

<body>

<div class="container">

<div class="glass" id="joinSection">

<input id="name" placeholder="Ваш ник">
<input id="pin" placeholder="Код комнаты">

<script>
// Backward-compat alias (old code uses `socket` everywhere)
let socket = null;

// === CONNECTION RESILIENCE (PLAYER) ===
let ws = null;
let wsJoin = null;              // { pin, name }
let reconnectTimer = null;
let reconnectAttempt = 0;
let suppressReconnectOnClose = false;

let heartbeatTimer = null;
let lastPongAt = Date.now();

const HEARTBEAT_MS = 15000;     // ping every 15s
const PONG_TIMEOUT_MS = 45000;  // if no pong for 45s -> reconnect

function saveJoinSession(){
  if(!wsJoin || !wsJoin.pin || !wsJoin.name) return;
  try{ sessionStorage.setItem("kahoot_last_join_session", JSON.stringify(wsJoin)); }catch(e){}
}

function clearJoinSession(){
  try{ sessionStorage.removeItem("kahoot_last_join_session"); }catch(e){}
}

function updateReturnButton(){
  const btn = document.getElementById("returnBtn");
  if(!btn) return;
  btn.style.display = (wsJoin && wsJoin.pin && wsJoin.name) ? "inline-block" : "none";
}

function returnToSavedGame(){
  if(!wsJoin || !wsJoin.pin || !wsJoin.name) return;
  document.getElementById("error").innerHTML = "";
  document.getElementById("joinSection").style.display = "none";
  document.getElementById("gameSection").style.display = "block";
  document.getElementById("content").innerHTML = "<div class='waiting'>Переподключение к игре...</div>";
  connectPlayerWS(false);
}

function buildPlayerWsUrl(pin, name){
  const protocol = location.protocol === "https:" ? "wss" : "ws";
  return `${protocol}://${location.host}/ws/player/${pin}/${encodeURIComponent(name)}`;
}

function stopHeartbeat(){
  if (heartbeatTimer){
    clearInterval(heartbeatTimer);
    heartbeatTimer = null;
  }
}

function startHeartbeat(){
  stopHeartbeat();
  heartbeatTimer = setInterval(()=>{
    if(!ws || ws.readyState !== WebSocket.OPEN) return;

    try{ ws.send(JSON.stringify({type:"ping", t:Date.now()})); }catch(e){}

    if(Date.now() - lastPongAt > PONG_TIMEOUT_MS){
      try{ ws.close(); }catch(e){}
    }
  }, HEARTBEAT_MS);
}

function scheduleReconnect(){
  if(reconnectTimer) return;
  if(closedByRoom) return; // don't reconnect if kicked/room closed

  reconnectAttempt = Math.min(reconnectAttempt + 1, 8);
  const delay = Math.min(2000 * Math.pow(2, reconnectAttempt - 1), 30000);

  reconnectTimer = setTimeout(()=>{
    reconnectTimer = null;
    connectPlayerWS(true);
  }, delay);
}

function connectPlayerWS(isReconnect=false){
  if(!wsJoin || !wsJoin.pin || !wsJoin.name) return;

  // close old
  try{
    if(ws){
      suppressReconnectOnClose = true;
      ws.close();
    }
  }catch(e){}

  ws = new WebSocket(buildPlayerWsUrl(wsJoin.pin, wsJoin.name));
  socket = ws; // alias so existing code keeps working

  ws.onopen = ()=>{
    reconnectAttempt = 0;
    lastPongAt = Date.now();
    startHeartbeat();

    // optional resume message (server may ignore)
    try{ ws.send(JSON.stringify({type:"resume", pin:wsJoin.pin, name:wsJoin.name})); }catch(e){}
  };

  ws.onmessage = (event)=>{
    let data = null;
    try{ data = JSON.parse(event.data); }catch(e){}

    // heartbeat
    if(data && (data.type === "pong" || data.type === "ping")){
      lastPongAt = Date.now();
      if(data.type === "ping"){
        try{ ws.send(JSON.stringify({type:"pong", t:Date.now()})); }catch(e){}
      }
      return;
    }

    handlePlayerMessage(event.data);
  };

  ws.onerror = ()=>{
    try{ ws.close(); }catch(e){}
  };

  ws.onclose = ()=>{
    stopHeartbeat();

    if(suppressReconnectOnClose){
      suppressReconnectOnClose = false;
      return;
    }

    // If room was closed / kicked we don't reconnect (the old code sets closedByRoom)
    if(closedByRoom){
      closedByRoom = false;
      return;
    }

    // Do NOT reset UI to join screen; just try to reconnect.
    scheduleReconnect();
  };
}

document.addEventListener("DOMContentLoaded", ()=>{
  try{
    const saved = JSON.parse(sessionStorage.getItem("kahoot_last_join_session") || "null");
    if(saved && saved.pin && saved.name){
      wsJoin = saved;
    }
  }catch(e){}
  updateReturnButton();
});

// handle background/foreground
document.addEventListener("visibilitychange", ()=>{
  if(!document.hidden){
    if(!ws || ws.readyState !== WebSocket.OPEN){
      scheduleReconnect();
    } else {
      lastPongAt = Date.now();
    }
  }
});
window.addEventListener("online", ()=> scheduleReconnect());
let answered=false;
let timerInterval;
let myAnswerIndex = null;
let closedByRoom = false;
let selectedAnswers = [];
let requiredSelections = 1;
let lastQuestionPayload = null;
let mySubmittedAnswer = null;      // text/numeric
let mySubmittedChoice = null;      // single mcq
let mySubmittedChoices = null;     // multi mcq
let appealSentForRevealId = null;

let audioEl = null;
let audioTick = null;


let lastRevealId = null;
let lastWasWrong = false;

function getQuestionStorageKey(payload){
    if(!payload) return "";
    return JSON.stringify({
        q: payload.question || "",
        t: payload.question_type || "mcq"
    });
}

function persistCurrentAnswerState(){
    const key = getQuestionStorageKey(lastQuestionPayload);
    if(!key) return;
    try{
        localStorage.setItem("kahoot_last_answer_state", JSON.stringify({
            key,
            submittedAnswer: mySubmittedAnswer,
            submittedChoice: mySubmittedChoice,
            submittedChoices: mySubmittedChoices,
        }));
    }catch(e){}
}

function getPersistedAnswerState(){
    try{
        const raw = JSON.parse(localStorage.getItem("kahoot_last_answer_state") || "null");
        if(!raw || raw.key !== getQuestionStorageKey(lastQuestionPayload)){
            return null;
        }
        return raw;
    }catch(e){
        return null;
    }
}

function restoreAnswerStateForCurrentQuestion(){
    const saved = getPersistedAnswerState();
    if(!saved) return;

    if(Array.isArray(saved.submittedChoices) && saved.submittedChoices.length){
        selectedAnswers = [...saved.submittedChoices];
        mySubmittedChoices = [...saved.submittedChoices];
        mySubmittedChoice = null;
        document.querySelectorAll(".answer-card").forEach((btn, index)=>{
            if(saved.submittedChoices.includes(index)){
                btn.classList.add("selected");
            }
            btn.style.pointerEvents = "none";
            btn.style.opacity = "0.9";
        });
        return;
    }

    if(Number.isInteger(saved.submittedChoice)){
        myAnswerIndex = saved.submittedChoice;
        mySubmittedChoice = saved.submittedChoice;
        selectedAnswers = [saved.submittedChoice];
        document.querySelectorAll(".answer-card").forEach((btn, index)=>{
            if(index === saved.submittedChoice){
                btn.classList.add("selected");
            }
            btn.style.pointerEvents = "none";
            btn.style.opacity = index === saved.submittedChoice ? "1" : "0.9";
        });
        return;
    }

    if(saved.submittedAnswer !== null && saved.submittedAnswer !== undefined){
        answered = true;
        mySubmittedAnswer = String(saved.submittedAnswer);
        const textInput = document.getElementById("textInput");
        const numericInput = document.getElementById("numericInput");
        const input = textInput || numericInput;
        if(input){
            input.value = String(saved.submittedAnswer);
            input.disabled = true;
            const btn = input.nextElementSibling;
            if(btn){
                btn.classList.add("disabled");
                btn.style.opacity = "0.6";
            }
        }
    }
}


// === Kahoot-style leaderboard animation ===
let previousLeaderboardOrder = [];

// === LIVE UPDATES (APPEALS) ===
function showPlayerToast(text){
    let el = document.getElementById("playerToast");
    if(!el){
        el = document.createElement("div");
        el.id = "playerToast";
        el.className = "player-toast";
        document.body.appendChild(el);

    el.textContent = text;
    el.classList.add("show");
    clearTimeout(window.__playerToastT);
    window.__playerToastT = setTimeout(()=>{
        el.classList.remove("show");

}

function renderLiveLeaderboard(leaderboard){
    const container = document.getElementById("liveLeaderboard");
    if(!container) return;

    const myName = document.getElementById("name").value.trim();
    container.innerHTML = "";

    if(!Array.isArray(leaderboard) || !leaderboard.length) return;

    leaderboard.forEach((player, index)=>{
        const position = index + 1;
        const isMe = player[0] === myName;
        const oldIndex = previousLeaderboardOrder.indexOf(player[0]);
        const diff = oldIndex === -1 ? 0 : oldIndex - index;

        const medal = position===1 ? "🥇" :
                      position===2 ? "🥈" :
                      position===3 ? "🥉" : "";

        const row = document.createElement("div");
        row.style.margin = "16px 0";
        row.style.padding = "20px 26px";
        row.style.borderRadius = "24px";
        row.style.fontSize = "20px";
        row.style.fontWeight = "900";
        row.style.display = "flex";
        row.style.justifyContent = "space-between";
        row.style.alignItems = "center";
        row.style.transition = "all .5s cubic-bezier(.16,1,.3,1)";
        row.style.boxShadow = "0 15px 40px rgba(0,0,0,0.4)";
        row.style.position = "relative";

        if(isMe){
            row.style.background = "linear-gradient(145deg,#00ffcc22,#00ffcc08)";
            row.style.border = "2px solid #00ffcc";
            row.style.boxShadow = "0 0 40px rgba(0,255,200,0.35)";
            row.style.transform = "scale(1.04)";
        } else {
            row.style.background = "rgba(255,255,255,0.08)";
            row.style.border = "1px solid rgba(255,255,255,0.1)";
        }

        if(diff > 0){
            row.style.boxShadow = "0 0 0 2px rgba(16,185,129,.4), 0 15px 40px rgba(16,185,129,.22)";
            row.animate([
                { transform: isMe ? "scale(1)" : "scale(0.97)" },
                { transform: isMe ? "scale(1.06)" : "scale(1.03)" },
                { transform: isMe ? "scale(1.04)" : "scale(1)" }
            ], { duration: 900, easing: "ease" });
        } else if(diff < 0){
            row.style.boxShadow = "0 0 0 2px rgba(239,68,68,.28), 0 15px 40px rgba(239,68,68,.18)";
            row.animate([
                { transform: isMe ? "scale(1.05)" : "scale(1.01)" },
                { transform: isMe ? "scale(1.01)" : "scale(0.985)" },
                { transform: isMe ? "scale(1.04)" : "scale(1)" }
            ], { duration: 900, easing: "ease" });
        }

        const badge = diff > 0
            ? `<span style="margin-left:8px;padding:4px 8px;border-radius:999px;background:rgba(16,185,129,.18);color:#6ee7b7;font-size:12px;font-weight:900;">▲ ${diff}</span>`
            : diff < 0
                ? `<span style="margin-left:8px;padding:4px 8px;border-radius:999px;background:rgba(239,68,68,.18);color:#fca5a5;font-size:12px;font-weight:900;">▼ ${Math.abs(diff)}</span>`
                : "";

        row.innerHTML = `
            <div>
                ${medal} ${position} место — ${player[0]}
                ${isMe ? " 👉 Вы" : ""}
                ${badge}
            </div>
            <div>${player[1]} очков</div>
        `;

        container.appendChild(row);
    });

    previousLeaderboardOrder = leaderboard.map(p => p[0]);
}

function setupQuestionAudio(audioSrc){
    cleanupQuestionAudio();

    if(!audioSrc) return;

    audioEl = document.getElementById("questionAudio");
    if(!audioEl) return;

    audioEl.src = audioSrc;
    audioEl.preload = "metadata";

    const progressEl = document.getElementById("audioProgress");
    const fmt = (t)=>{
        if(!Number.isFinite(t)) return "0:00";
        const m = Math.floor(t/60);
        const s = Math.floor(t%60);
        return `${m}:${String(s).padStart(2,'0')}`;
    };

    audioTick = setInterval(()=>{
        if(!audioEl) return;
        if(progressEl){
            progressEl.textContent = `${fmt(audioEl.currentTime)} / ${fmt(audioEl.duration)}`;
        }
    }, 200);

    audioEl.addEventListener("ended", ()=>{
        if(progressEl){
            progressEl.textContent = `${fmt(audioEl.duration)} / ${fmt(audioEl.duration)}`;
        }
    }, { once:true });
}

function cleanupQuestionAudio(){
    if(audioTick){
        clearInterval(audioTick);
        audioTick = null;
    }
    if(audioEl){
        try{ audioEl.pause(); }catch(e){}
        try{ audioEl.currentTime = 0; }catch(e){}
        audioEl = null;
    }
}

async function audioPlay(){
    if(!audioEl) audioEl = document.getElementById("questionAudio");
    if(!audioEl) return;
    try{
        await audioEl.play();
    }catch(e){
        console.warn("Audio play failed", e);
    }
}

function audioPause(){
    if(!audioEl) audioEl = document.getElementById("questionAudio");
    if(!audioEl) return;
    try{ audioEl.pause(); }catch(e){}
}

function audioRestart(){
    if(!audioEl) audioEl = document.getElementById("questionAudio");
    if(!audioEl) return;
    try{ audioEl.currentTime = 0; }catch(e){}
    audioPlay();
}

function audioStop(){
    if(!audioEl) audioEl = document.getElementById("questionAudio");
    if(!audioEl) return;
    try{ audioEl.pause(); }catch(e){}
    try{ audioEl.currentTime = 0; }catch(e){}
}
function buildMyAnswerForAppeal(){
    const q = lastQuestionPayload || {};
    const type = q.question_type || "mcq";

    if(type === "text" || type === "numeric"){
        return (mySubmittedAnswer === null || mySubmittedAnswer === undefined) ? "" : String(mySubmittedAnswer);
    }

    // mcq/fastest/poll
    if(Array.isArray(mySubmittedChoices)){
        try{
            return mySubmittedChoices
                .map(i => (q.answers && q.answers[i]) ? q.answers[i] : String(i))
                .join(", ");
        }catch(e){
            return "";
        }
    }

    if(typeof mySubmittedChoice === "number"){
        return (q.answers && q.answers[mySubmittedChoice]) ? q.answers[mySubmittedChoice] : String(mySubmittedChoice);
    }

    return "";
}

function sendAppealRequest(reasonText){
    if(!socket || socket.readyState !== WebSocket.OPEN){
        scheduleReconnect();
        return;
    }

    const q = lastQuestionPayload || {};

    socket.send(JSON.stringify({
        type: "appeal_request",
        question: q.question || "",
        question_type: q.question_type || "mcq",
        answer: buildMyAnswerForAppeal(),
        reason: String(reasonText || "").trim(),
        reveal_id: lastRevealId || null
    }));
}

function renderAppealBox(){
    if(document.getElementById("appealBox")) return;

    const box = document.createElement("div");
    box.className = "appeal-box";
    box.id = "appealBox";

    box.innerHTML = `
        <div class="appeal-box-title">📝 Апелляция</div>
        <div class="appeal-hint">Если считаешь, что ответ должен быть засчитан — отправь апелляцию ведущему.</div>
        <div class="appeal-actions" style="justify-content:flex-start;margin-top:10px;">
            <button id="appealQuickTypo" type="button" class="appeal-btn secondary" style="height:44px;">Опечатка</button>
        </div>
        <textarea id="appealReason" class="appeal-reason" rows="3"
            placeholder="Коротко: почему засчитать? (опечатка / близкий ответ и т.п.)"></textarea>
        <div class="appeal-actions">
            <button id="appealSendBtn" type="button" class="appeal-btn primary">Отправить</button>
            <button id="appealHideBtn" type="button" class="appeal-btn secondary">Скрыть</button>
        </div>
        <div id="appealStatus" class="appeal-status"></div>
    `;

    const content = document.getElementById("content");
    if(!content) return;
    content.appendChild(box);

    const sendBtn = document.getElementById("appealSendBtn");
    const hideBtn = document.getElementById("appealHideBtn");
    const reason = document.getElementById("appealReason");
    const status = document.getElementById("appealStatus");
    const quickTypoBtn = document.getElementById("appealQuickTypo");

    if(sendBtn){
        sendBtn.addEventListener("click", ()=>{
            if(appealSentForRevealId && appealSentForRevealId === lastRevealId){
                if(status) status.textContent = "Апелляция уже отправлена.";
                return;
            }
            sendAppealRequest(reason ? reason.value : "");
            appealSentForRevealId = lastRevealId;
            if(status) status.textContent = "✅ Апелляция отправлена. Ждите решения ведущего.";
            sendBtn.disabled = true;
            sendBtn.style.opacity = "0.6";
            if(quickTypoBtn){
                quickTypoBtn.disabled = true;
                quickTypoBtn.style.opacity = "0.6";
            }
        });
    }

    if(quickTypoBtn){
        quickTypoBtn.addEventListener("click", ()=>{
            if(appealSentForRevealId && appealSentForRevealId === lastRevealId){
                if(status) status.textContent = "Апелляция уже отправлена.";
                return;
            }
            if(reason){
                reason.value = "опечатка";
            }
            sendAppealRequest("опечатка");
            appealSentForRevealId = lastRevealId;
            if(status) status.textContent = "✅ Апелляция отправлена (опечатка). Ждите решения ведущего.";
            // lock all send actions
            if(sendBtn){
                sendBtn.disabled = true;
                sendBtn.style.opacity = "0.6";
            }
            quickTypoBtn.disabled = true;
            quickTypoBtn.style.opacity = "0.6";
        });
    }

    if(hideBtn){
        hideBtn.addEventListener("click", ()=> box.remove());
    }
}

function handlePlayerMessage(raw){
    const event = { data: raw };
    const data = JSON.parse(event.data);

    // 🔹 Appeal applied by host — update leaderboard live
    if(data && data.type === "appeal_awarded"){
        if(data.username && typeof data.delta === "number"){
            const sign = data.delta > 0 ? "+" : "";
            showPlayerToast(`Апелляция: ${data.username} ${sign}${data.delta} очков`);
        } else {
            showPlayerToast("Апелляция применена");
        }

        if(Array.isArray(data.leaderboard)){
            if(document.getElementById("liveLeaderboard")){
                renderLiveLeaderboard(data.leaderboard);
            }
        }
        return;
    }

    // 🔹 Result of your appeal (approved/denied)
    if(data && data.type === "appeal_result"){
        if(data.approved){
            showPlayerToast("✅ Апелляция одобрена ведущим");
        } else {
            showPlayerToast("❌ Апелляция отклонена ведущим");
        }
        const st = document.getElementById("appealStatus");
        if(st){
            st.textContent = data.approved ? "✅ Апелляция одобрена" : "❌ Апелляция отклонена";
        }
        return;
    }

    // === From here: KEEP YOUR EXISTING MESSAGE HANDLING LOGIC EXACTLY AS IT WAS ===
    // IMPORTANT: the rest of your current onmessage body stays, but it must NOT reference a nested handlePlayerMessage.
    if(data.type === "error"){
        socket.close();
        socket = null;
        document.getElementById("joinSection").style.display="block";
        document.getElementById("gameSection").style.display="none";
        document.getElementById("content").innerHTML = "";
        document.getElementById("error").innerHTML =
            `<div class="error">${data.message}</div>`;
        return;
    }

    if(data.type==="kicked"){
        closedByRoom = true;

        if(socket){
            try{ socket.close(); }catch(e){}
        }

        clearInterval(timerInterval);
        cleanupQuestionAudio();
        const overlay = document.getElementById("pauseOverlay");
        if(overlay){
            overlay.classList.add("hidden");
        }

    document.getElementById("joinSection").style.display = "block";
    document.getElementById("gameSection").style.display = "none";
    document.getElementById("content").innerHTML = "";
    document.getElementById("error").innerHTML =
            "<div class='error'>Вы кикнуты ведущим</div>";
        clearJoinSession();
        updateReturnButton();

        // Полный сброс состояния
        document.getElementById("name").value = "";
        document.getElementById("pin").value = "";
        answered = false;
        myAnswerIndex = null;
        socket = null;

        return;
    }

    if(data.type === "test_aborted"){
        closedByRoom = true;

        if(socket){
            try{ socket.close(); }catch(e){}
        }

        clearInterval(timerInterval);
        cleanupQuestionAudio();
        const overlay = document.getElementById("pauseOverlay");
        if(overlay){
            overlay.classList.add("hidden");
        }

        document.getElementById("joinSection").style.display = "block";
        document.getElementById("gameSection").style.display = "none";
        document.getElementById("content").innerHTML = "";
        document.getElementById("error").innerHTML =
            `<div class='error'>${data.message || "Тест завершен"}</div>`;
        clearJoinSession();
        updateReturnButton();

        document.getElementById("name").value = "";
        document.getElementById("pin").value = "";
        answered = false;
        myAnswerIndex = null;
        socket = null;

        return;
    }

    if(data.type === "room_closed"){
        closedByRoom = true;

        if(socket){
            try{ socket.close(); }catch(e){}
        }

        clearInterval(timerInterval);
        cleanupQuestionAudio();
        const overlay = document.getElementById("pauseOverlay");
        if(overlay){

function join(){
    // Защита от повторного подключения с тем же ником
    if(socket && socket.readyState === WebSocket.OPEN){
        showError("Вы уже подключены к комнате");
        return;
    }
    const name = document.getElementById("name").value.trim();
    const pin = document.getElementById("pin").value.trim();

    if(!name || !pin){
        showError("Введите ник и код комнаты");
        return;
    }

    document.getElementById("error").innerHTML = "";
    document.getElementById("content").innerHTML = "";

    wsJoin = { pin, name };
    saveJoinSession();
    updateReturnButton();
    connectPlayerWS(false);
}


function answerMCQ(i, element){
    const overlay = document.getElementById("pauseOverlay");
    if(overlay && !overlay.classList.contains("hidden")) return;

    // ===== SINGLE SELECTION MODE =====
    if(requiredSelections === 1){
        // Remove previous selection
        document.querySelectorAll(".answer-card").forEach(btn=>{
            btn.classList.remove("selected");
        });

        selectedAnswers = [i];
        myAnswerIndex = i;
        mySubmittedChoice = i;
        mySubmittedChoices = null;
        element.classList.add("selected");

        // Send selection but DO NOT lock answering
        if(socket && socket.readyState === WebSocket.OPEN){
            socket.send(JSON.stringify({
                type:"answer",
                selected:i
            }));
            persistCurrentAnswerState();
        } else {
            scheduleReconnect();
        }
    }
    // ===== MULTI SELECTION MODE =====
    else {
        // Toggle selection (no lock until reveal)
        if(selectedAnswers.includes(i)){
            selectedAnswers = selectedAnswers.filter(x => x !== i);
            element.classList.remove("selected");
        } else {
            selectedAnswers.push(i);
            element.classList.add("selected");
        }

        if(socket && socket.readyState === WebSocket.OPEN){
            mySubmittedChoices = [...selectedAnswers];
            mySubmittedChoice = null;
            socket.send(JSON.stringify({
                type:"answer",
                selected:selectedAnswers
            }));
            persistCurrentAnswerState();
        } else {
            scheduleReconnect();
        }
    }
}
function answerText(){
    if(answered) return;

    const value = document.getElementById("textInput").value.trim();
    if(!value) return;

    answered = true;
    mySubmittedAnswer = value;

    if(socket && socket.readyState === WebSocket.OPEN){
        socket.send(JSON.stringify({
            type:"answer",
            value:value
        }));
        persistCurrentAnswerState();
    } else {
        scheduleReconnect();
    }

    document.getElementById("textInput").disabled = true;
}

function answerNumeric(){
    if(answered) return;

    const input = document.getElementById("numericInput");
    if(!input) return;

    const value = input.value.trim();
    if(value === "") return;

    answered = true;
    mySubmittedAnswer = value;

    if(socket && socket.readyState === WebSocket.OPEN){
        socket.send(JSON.stringify({
            type:"answer",
            value:Number(value)
        }));
        persistCurrentAnswerState();
    } else {
        scheduleReconnect();
    }

    input.disabled = true;

    const btn = input.nextElementSibling;
    if(btn){
        btn.classList.add("disabled");
        btn.style.opacity = "0.6";
    }
}

function startTimer(seconds){
    // Adjust for network delay so timer matches host
    let time = seconds - 1;
    const circle = document.getElementById("timerCircle");
    const text = document.getElementById("timerText");

    const radius = 60;
    const circumference = 2 * Math.PI * radius;

    circle.style.strokeDasharray = circumference;
    circle.style.strokeDashoffset = 0;

    clearInterval(timerInterval);

    function update(){
        const safeTime = Math.max(time, 0);
        const progress = safeTime / seconds;
        circle.style.strokeDashoffset = circumference * (1 - progress);

        if(text){
            text.innerText = safeTime;
        }

        if(safeTime <= 5){
            circle.style.stroke = "#ef4444";
        } else {
            circle.style.stroke = "#00ffcc";
        }
    }

    update();

    timerInterval = setInterval(()=>{
        time--;

        if(time < 0){
            time = 0;
            update();
            clearInterval(timerInterval);
            return;
        }

        update();
    },1000);
}
function showError(msg){
    document.getElementById("error").innerHTML=
        `<div class="error">${msg}</div>`;
}

function goBack(){
    closedByRoom = true;
    try{ stopHeartbeat(); }catch(e){}
    clearJoinSession();
    updateReturnButton();
    try{ localStorage.removeItem("kahoot_last_answer_state"); }catch(e){}
    if(socket){
        try{ socket.close(); }catch(e){}
    }
    ws = null;
    socket = null;
    cleanupQuestionAudio();
    document.getElementById("joinSection").style.display="block";
    document.getElementById("gameSection").style.display="none";
    document.getElementById("content").innerHTML="";
    document.getElementById("error").innerHTML="";
    answered=false;
    myAnswerIndex = null;
    document.getElementById("name").value="";
    document.getElementById("pin").value="";
}

</script>
