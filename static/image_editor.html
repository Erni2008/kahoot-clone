<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image Editor (Dev Tool)</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;800&family=Sora:wght@600;700;800&display=swap" rel="stylesheet">
<style>
:root{
    --bg1:#061a27;
    --bg2:#0b2438;
    --line:rgba(150,197,230,.22);
    --text:#eaf4fb;
    --muted:#9ec4dc;
    --accent:#0ea5a4;
}

*{
    box-sizing:border-box;
}

body{
    margin:0;
    min-height:100vh;
    font-family:"DM Sans",sans-serif;
    color:var(--text);
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:30px 16px 40px;
    background:radial-gradient(1200px 900px at 0% 0%, #10415d 0%, transparent 45%),
               radial-gradient(1000px 700px at 100% 100%, #10324a 0%, transparent 45%),
               linear-gradient(145deg,var(--bg1),var(--bg2));
}

body::before,
body::after{
    content:"";
    position:fixed;
    border-radius:999px;
    filter:blur(80px);
    pointer-events:none;
    z-index:-1;
}

body::before{
    width:320px;
    height:320px;
    left:-80px;
    top:-80px;
    background:rgba(14,165,164,.24);
    animation:orbMoveA 12s ease-in-out infinite alternate;
}

body::after{
    width:360px;
    height:360px;
    right:-90px;
    bottom:-100px;
    background:rgba(249,115,22,.16);
    animation:orbMoveB 14s ease-in-out infinite alternate;
}

@keyframes orbMoveA{
    from{transform:translate(0,0) scale(1);}
    to{transform:translate(26px,24px) scale(1.08);}
}

@keyframes orbMoveB{
    from{transform:translate(0,0) scale(1);}
    to{transform:translate(-28px,-20px) scale(1.1);}
}

h1{
    margin:4px 0 18px;
    font-family:"Sora",sans-serif;
    font-size:clamp(24px,3.6vw,36px);
    text-align:center;
}

.sub{
    margin:0 0 26px;
    color:var(--muted);
    font-weight:600;
    text-align:center;
}

.editor-container{
    width:min(1200px, 100%);
    display:grid;
    grid-template-columns:minmax(280px, 1fr) minmax(300px, 420px);
    gap:20px;
    align-items:start;
}

.preview-panel,
.controls{
    border:1px solid var(--line);
    background:linear-gradient(170deg, rgba(11,39,58,.8), rgba(6,25,39,.74));
    border-radius:20px;
    box-shadow:0 20px 50px rgba(3,14,24,.5), inset 0 1px 0 rgba(255,255,255,.06);
}

.preview-panel{
    padding:16px;
    animation:cardIn .45s ease;
}

.preview-wrapper{
    width:100%;
    aspect-ratio:1/1;
    overflow:hidden;
    border-radius:16px;
    box-shadow:0 24px 70px rgba(0,0,0,0.55);
    position:relative;
    background-repeat:no-repeat;
    background-size:300%;
    background-position:50% 50%;
    border:1px solid rgba(150,197,230,.25);
    transition:background-size .22s ease, background-position .22s ease, transform .3s ease;
}

.preview-wrapper:hover{
    transform:translateY(-2px);
}

.controls{
    display:flex;
    flex-direction:column;
    gap:16px;
    padding:18px;
    animation:cardIn .5s ease;
}

@keyframes cardIn{
    from{opacity:0;transform:translateY(8px);}
    to{opacity:1;transform:translateY(0);}
}

.field{
    display:flex;
    flex-direction:column;
    gap:8px;
}

label{
    font-weight:700;
    font-size:14px;
    letter-spacing:.01em;
}

input[type="range"]{
    width:100%;
    accent-color:var(--accent);
}

input[type="text"]{
    padding:12px;
    border-radius:12px;
    border:1px solid var(--line);
    font-size:14px;
    width:100%;
    background:rgba(4,18,30,.78);
    color:var(--text);
    outline:none;
    transition:border-color .25s ease, box-shadow .25s ease;
}

input[type="text"]:focus{
    border-color:rgba(14,165,164,.72);
    box-shadow:0 0 0 4px rgba(14,165,164,.18);
}

button{
    padding:14px 20px;
    border:1px solid rgba(255,255,255,.14);
    border-radius:12px;
    font-family:"Sora",sans-serif;
    font-weight:700;
    cursor:pointer;
    background:linear-gradient(130deg,#0ea5a4,#0891b2);
    color:white;
    transition:transform .2s ease, box-shadow .25s ease;
}

button:hover{
    transform:translateY(-2px);
    box-shadow:0 14px 34px rgba(0,0,0,.34);
}

.output{
    margin-top:2px;
    background:rgba(5,22,34,.9);
    border:1px solid rgba(150,197,230,.2);
    padding:14px;
    border-radius:12px;
    width:100%;
    font-family:ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
    font-size:13px;
    color:#d1fae5;
    white-space:pre-wrap;
}

@media (max-width: 980px){
    .editor-container{
        grid-template-columns:1fr;
    }
}

@media (prefers-reduced-motion:reduce){
    *{
        animation:none !important;
        transition:none !important;
    }
}
</style>
</head>
<body>

<h1>🖼 Image Question Editor</h1>
<p class="sub">Точная настройка области изображения для режимов угадай-картинку.</p>

<div class="editor-container">

    <div class="preview-panel">
        <div class="preview-wrapper" id="preview"></div>
    </div>

    <div class="controls">

        <div class="field">
            <label>Image URL / Path</label>
            <input type="text" id="imagePath" placeholder="/static/images/example.png" oninput="updateImage()">
        </div>

        <div class="field">
            <label>Zoom: <span id="zoomValue">3</span></label>
            <input type="range" min="1" max="12" step="0.1" value="3" oninput="updateZoom(this.value)">
        </div>

        <div class="field">
            <label>X Position: <span id="xValue">50%</span></label>
            <input type="range" min="0" max="100" value="50" oninput="updateX(this.value)">
        </div>

        <div class="field">
            <label>Y Position: <span id="yValue">50%</span></label>
            <input type="range" min="0" max="100" value="50" oninput="updateY(this.value)">
        </div>

        <div class="field">
            <label>Move Horizontally (px): <span id="offsetXValue">0</span></label>
            <input type="range" min="-300" max="300" value="0" oninput="updateOffsetX(this.value)">
        </div>

        <div class="field">
            <label>Move Vertically (px): <span id="offsetYValue">0</span></label>
            <input type="range" min="-300" max="300" value="0" oninput="updateOffsetY(this.value)">
        </div>

        <button onclick="copyConfig()">📋 Скопировать конфиг</button>

        <div class="output" id="output"></div>

    </div>

</div>

<script>

let zoom = 3;
let posX = 50;
let posY = 50;
let offsetX = 0;
let offsetY = 0;

function updatePreview(){
    const preview = document.getElementById("preview");

    const finalX = `calc(${posX}% + ${offsetX}px)`;
    const finalY = `calc(${posY}% + ${offsetY}px)`;

    preview.style.backgroundSize = `${zoom * 100}%`;
    preview.style.backgroundPosition = `${finalX} ${finalY}`;
}

function updateImage(){
    const path = document.getElementById("imagePath").value;
    const preview = document.getElementById("preview");

    preview.style.backgroundImage = `url('${path}')`;
    updatePreview();
}

function updateZoom(val){
    zoom = parseFloat(val);
    document.getElementById("zoomValue").innerText = zoom;
    updatePreview();
    updateOutput();
}

function updateX(val){
    posX = parseInt(val);
    document.getElementById("xValue").innerText = posX + "%";
    updatePreview();
    updateOutput();
}

function updateY(val){
    posY = parseInt(val);
    document.getElementById("yValue").innerText = posY + "%";
    updatePreview();
    updateOutput();
}

function updateOffsetX(val){
    offsetX = parseInt(val);
    document.getElementById("offsetXValue").innerText = offsetX;
    updatePreview();
    updateOutput();
}

function updateOffsetY(val){
    offsetY = parseInt(val);
    document.getElementById("offsetYValue").innerText = offsetY;
    updatePreview();
    updateOutput();
}

function updateOutput(){
    const path = document.getElementById("imagePath").value;

    const config = {
        image: path,
        image_zoom: Number(zoom),
        image_position: `${posX}% ${posY}%`,
        image_offset: { x: offsetX, y: offsetY }
    };

    document.getElementById("output").innerText =
JSON.stringify(config, null, 4);
}

function copyConfig(){
    const text = document.getElementById("output").innerText;
    navigator.clipboard.writeText(text);
    alert("Конфиг скопирован!");
}

</script>

</body>
</html>
